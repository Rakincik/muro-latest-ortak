# ============================================
# MURO LMS Demo — Nginx Subdomain Config
# ============================================
# Subdomains:
#   3u-ap.muro.click  → API     (127.0.0.1:5292)
#   3u-ad.muro.click  → Admin   (127.0.0.1:3001)
#   3u.muro.click     → Student (127.0.0.1:3002)
# ============================================
# Yerleştir: /etc/nginx/sites-available/3u-demo.conf
# Aktifleştir: ln -s /etc/nginx/sites-available/3u-demo.conf /etc/nginx/sites-enabled/
# Test: nginx -t && systemctl reload nginx
# ============================================

# --- Rate Limiting ---
limit_req_zone $binary_remote_addr zone=demo_api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=demo_login_limit:10m rate=5r/m;

# ═══════════════════════════════════════════
# API Backend — 3u-ap.muro.click
# ═══════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name 3u-ap.muro.click;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 3u-ap.muro.click;

    ssl_certificate /etc/letsencrypt/live/3u-ap.muro.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/3u-ap.muro.click/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Video upload boyutu
    client_max_body_size 256M;

    # API endpoints
    location /api/ {
        limit_req zone=demo_api_limit burst=50 nodelay;

        proxy_pass http://127.0.0.1:5292;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Login rate limiting
    location /api/v1/auth/login {
        limit_req zone=demo_login_limit burst=3 nodelay;

        proxy_pass http://127.0.0.1:5292;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR WebSocket
    location /hubs/ {
        proxy_pass http://127.0.0.1:5292;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # HLS streaming
    location ~* \.(m3u8|ts)$ {
        proxy_pass http://127.0.0.1:5292;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Health check (direct)
    location /health {
        proxy_pass http://127.0.0.1:5292;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Catch-all for API
    location / {
        proxy_pass http://127.0.0.1:5292;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

